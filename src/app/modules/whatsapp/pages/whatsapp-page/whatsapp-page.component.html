<div class="whatsapp-page">
  <app-shell-sidebar
    activeSection="whatsapp"
    [schedulesBadge]="schedulesBadgeCount"
    (sectionSelect)="onShellSectionSelect($event)"
    (about)="openAboutModal()"
  ></app-shell-sidebar>

  <div class="whatsapp-page__content">
    <app-page-header class="whatsapp-page__header" title="WhatsApp" subtitle="Conversas e mensagens">
      <button *ngIf="false" header-actions class="btn btn-outline btn-sm" type="button" (click)="toggleAgent()">
        <span class="material-symbols-outlined config-menu-icon">smart_toy</span>
        {{ agentToggleLabel }}
      </button>
      <button class="config-menu-item" type="button" (click)="openQuickReplyManager()">
        <span class="material-symbols-outlined config-menu-icon">bolt</span>
        Mensagens rápidas
      </button>
      <button class="config-menu-item" type="button" (click)="openLabelManager()">
        <span class="material-symbols-outlined config-menu-icon">sell</span>
        Etiquetas
      </button>
      <button class="config-menu-item" type="button" (click)="openScheduleList()">
        <span class="material-symbols-outlined config-menu-icon">schedule_send</span>
        Agendamentos de mensagens
      </button>
      <button class="config-menu-item" type="button" (click)="goToHome()">
        <span class="material-symbols-outlined config-menu-icon">group</span>
        Voltar para a central
      </button>
      <button class="config-menu-item" type="button" (click)="onToggleSessionConnection()" [disabled]="isSessionActionLoading">
        <span class="material-symbols-outlined config-menu-icon">{{ shouldShowDisconnectAction ? 'wifi_off' : 'wifi' }}</span>
        {{ connectActionLabel }}
      </button>
      <button class="config-menu-item" type="button" (click)="openAboutModal()">
        <span class="material-symbols-outlined config-menu-icon">info</span>
        Ver versão do app
      </button>
    </app-page-header>

    <main class="whatsapp-page__main">
      <section class="whatsapp-page__console-shell" *ngIf="isSessionReady; else sessionGate">
        <app-whatsapp-console></app-whatsapp-console>
      </section>
    </main>
  </div>

  <ng-template #sessionGate>
    <section class="whatsapp-page__session-gate">
      <div class="whatsapp-page__auth-card">
        <div class="whatsapp-page__auth-icon">
          <app-whatsapp-icon class="whatsapp-page__auth-icon-symbol"></app-whatsapp-icon>
        </div>

        <div class="whatsapp-page__auth-copy">
          <h2 class="whatsapp-page__auth-title">WhatsApp</h2>
          <p class="whatsapp-page__auth-status">{{ sessionStatusText }}</p>
        </div>

        <div class="whatsapp-page__auth-loading" *ngIf="isCheckingSession">
          <div class="loading-spinner"></div>
        </div>

        <div class="whatsapp-page__qr" *ngIf="!isCheckingSession && qrCodeDataUrl">
          <img class="whatsapp-page__qr-image" [src]="qrCodeDataUrl" alt="QR code para conectar WhatsApp" />
          <p class="whatsapp-page__qr-text">Abra o WhatsApp no celular e escaneie este código para continuar.</p>
        </div>

        <p class="whatsapp-page__session-error" *ngIf="sessionErrorMessage">{{ sessionErrorMessage }}</p>
        <button
          *ngIf="sessionErrorMessage"
          type="button"
          class="btn btn-outline btn-sm whatsapp-page__retry-btn"
          (click)="retrySession()"
        >
          <span class="material-symbols-outlined">refresh</span>
          Tentar novamente
        </button>
      </div>
    </section>
  </ng-template>

  <app-about-modal
    [isOpen]="isAboutModalOpen"
    [version]="appVersion"
    [whatsNew]="appWhatsNew"
    (close)="closeAboutModal()"
  ></app-about-modal>

  <div class="modal-backdrop" *ngIf="isDisconnectModalOpen" (click)="closeDisconnectModal()"></div>
  <section class="whatsapp-page__disconnect-modal" *ngIf="isDisconnectModalOpen" role="dialog" aria-modal="true">
    <header class="whatsapp-page__disconnect-header">
      <h3 class="whatsapp-page__disconnect-title">Desconectar WhatsApp</h3>
    </header>

    <p class="whatsapp-page__disconnect-text">Tem certeza que deseja desconectar do WhatsApp?</p>

    <footer class="whatsapp-page__disconnect-actions">
      <button class="btn btn-outline whatsapp-page__disconnect-button" type="button" (click)="closeDisconnectModal()" [disabled]="isSessionActionLoading">
        Cancelar
      </button>
      <button class="btn btn-primary whatsapp-page__disconnect-button whatsapp-page__disconnect-button--primary" type="button" (click)="confirmDisconnect()" [disabled]="isSessionActionLoading">
        <span class="material-symbols-outlined whatsapp-page__disconnect-button-icon">wifi_off</span>
        <span>{{ isSessionActionLoading ? 'Desconectando...' : 'Desconectar' }}</span>
      </button>
    </footer>
  </section>

  <app-quick-reply-manager-modal
    [isOpen]="isQuickReplyManagerOpen"
    (close)="closeQuickReplyManager()"
  ></app-quick-reply-manager-modal>

  <app-label-manager-modal
    [isOpen]="isLabelManagerOpen"
    (close)="closeLabelManager()"
  ></app-label-manager-modal>

</div>
