<div class="message-list" #scrollContainer>
  <div class="message-list__empty" *ngIf="!messages.length">
    Ainda não há mensagens nesta conversa.
  </div>

  <article
    *ngFor="let message of messages; trackBy: trackById"
    class="message-list__bubble"
    [class.message-list__bubble--from-me]="message.isFromMe"
  >
    <div class="message-list__media" *ngIf="isMediaMessage(message)">
      <img class="message-list__image" *ngIf="isImageMessage(message)" [src]="imagePreviewUrl(message)" alt="Imagem anexada" />

      <div class="message-list__file" *ngIf="!isImageMessage(message)">
        <span class="material-symbols-outlined message-list__file-icon">description</span>
        <div class="message-list__file-copy">
          <strong class="message-list__file-label">{{ mediaLabel(message) }}</strong>
          <small class="message-list__file-name">{{ mediaFilename(message) }}</small>
        </div>
      </div>
    </div>

    <p class="message-list__text" *ngIf="messageText(message) as text">{{ text }}</p>
    <div class="message-list__footer">
      <time class="message-list__time">{{ message.sentAt | date:'dd/MM HH:mm' }}</time>
      <span
        *ngIf="message.isFromMe && getAckIcon(message)"
        class="material-symbols-outlined message-list__ack"
        [class.message-list__ack--read]="isAckRead(message)"
      >{{ getAckIcon(message) }}</span>
    </div>
  </article>
</div>
