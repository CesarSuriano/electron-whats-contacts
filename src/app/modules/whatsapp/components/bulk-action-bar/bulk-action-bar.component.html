<div class="bulk-bar">
  <button type="button" class="btn-icon" [disabled]="disabled" (click)="exitMode.emit()" aria-label="Sair da seleção">
    <span class="material-symbols-outlined">close</span>
  </button>

  <span class="bulk-count">{{ selectedCount }} {{ selectedCount === 1 ? 'selecionada' : 'selecionadas' }}</span>

  <div class="bulk-actions">
    <button type="button" class="btn-link" *ngIf="!allSelected" [disabled]="disabled" (click)="selectAll.emit()">
      Selecionar tudo
    </button>
    <button type="button" class="btn-link" *ngIf="selectedCount > 0" [disabled]="disabled" (click)="clearSelection.emit()">
      Limpar
    </button>
    <button
      type="button"
      class="btn-secondary"
      [disabled]="disabled || selectedCount === 0"
      (click)="openLabels.emit()"
    >
      <span class="material-symbols-outlined">sell</span>
      Etiquetas
    </button>
    <button
      type="button"
      class="btn-secondary"
      [disabled]="disabled || selectedCount === 0"
      (click)="openSchedule.emit()"
    >
      <span class="material-symbols-outlined">schedule_send</span>
      Agendar
    </button>
    <button
      type="button"
      class="bulk-bar__primary-action"
      [disabled]="disabled || selectedCount === 0"
      (click)="openBulkSend.emit()"
    >
      <span class="material-symbols-outlined">send</span>
      Definir mensagem
    </button>
  </div>

  <!--
    5º botão, separado em um cluster próprio porque tem semântica diferente
    dos outros: ele não dispara uma ação primária da seleção em massa, ele
    abre de novo o modal pra editar a mensagem que o usuário já definiu
    (quando esse botão fica visível).
  -->
  <div class="bulk-actions bulk-actions--secondary" *ngIf="canEditBulkMessage">
    <button
      type="button"
      class="btn-secondary"
      [disabled]="disabled"
      (click)="editBulkMessage.emit()"
    >
      <span class="material-symbols-outlined">edit_note</span>
      Editar mensagem
    </button>
  </div>
</div>
