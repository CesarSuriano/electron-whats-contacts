<div class="label-picker" *ngIf="isOpen" data-label-popover>
  <header class="label-picker__header">
    <span class="material-symbols-outlined label-picker__header-icon">sell</span>
    <span class="label-picker__header-title">Etiquetas</span>
    <button type="button" class="label-picker__manage" (click)="manage.emit()">Gerenciar</button>
  </header>

  <div class="label-picker__search" *ngIf="!isCreating">
    <span class="material-symbols-outlined label-picker__search-icon">search</span>
    <input
      type="text"
      [(ngModel)]="searchTerm"
      placeholder="Buscar etiqueta"
      autofocus
    />
  </div>

  <ul class="label-picker__list" *ngIf="!isCreating">
    <li
      *ngFor="let label of filteredLabels"
      class="label-picker__item"
      [class.label-picker__item--selected]="label.selected"
      [class.label-picker__item--readonly]="!label.interactive"
      (click)="onLabelClick(label)"
    >
      <span class="label-picker__color-dot" [style.background]="label.color"></span>
      <span class="label-picker__item-name">{{ label.name }}</span>

      <span class="label-picker__item-badge" *ngIf="label.source === 'whatsapp'">WhatsApp</span>

      <button
        *ngIf="label.source === 'app' && label.selected"
        type="button"
        class="label-picker__remove"
        (click)="requestRemoveLabel(label, $event)"
        [attr.aria-label]="'Remover etiqueta ' + label.name"
      >
        <span class="material-symbols-outlined">close</span>
      </button>
    </li>

    <li class="label-picker__empty" *ngIf="!filteredLabels.length">
      <p>Nenhuma etiqueta {{ searchTerm ? 'encontrada' : 'cadastrada' }}.</p>
    </li>
  </ul>

  <button
    *ngIf="!isCreating"
    type="button"
    class="label-picker__create-trigger"
    (click)="startCreate()"
  >
    <span class="material-symbols-outlined">add</span>
    Nova etiqueta{{ searchTerm ? ' "' + searchTerm + '"' : '' }}
  </button>

  <div class="label-picker__create-form" *ngIf="isCreating">
    <label>Nome</label>
    <input type="text" [(ngModel)]="newLabelName" placeholder="Ex: VIP" maxlength="40" />

    <label>Cor</label>
    <div class="label-picker__color-row">
      <input type="color" [value]="newLabelColor" (input)="pickColor($any($event.target).value)" />
      <div class="label-picker__color-suggestions">
        <button
          *ngFor="let color of suggestedColors"
          type="button"
          class="label-picker__color-suggestion"
          [class.label-picker__color-suggestion--active]="color.toLowerCase() === newLabelColor.toLowerCase()"
          [style.background]="color"
          [attr.aria-label]="color"
          (click)="pickColor(color)"
        ></button>
      </div>
    </div>

    <div class="label-picker__create-actions">
      <button type="button" class="btn btn-outline btn-sm" (click)="cancelCreate()">Cancelar</button>
      <button type="button" class="btn btn-primary btn-sm" (click)="confirmCreate()" [disabled]="!newLabelName.trim()">
        Criar e aplicar
      </button>
    </div>
  </div>

  <div class="label-picker__confirm-overlay" *ngIf="pendingRemovalLabel" (click)="closeRemoveDialog()">
    <div class="label-picker__confirm-dialog" role="dialog" aria-modal="true" aria-labelledby="label-picker-remove-title" (click)="$event.stopPropagation()">
      <div class="label-picker__confirm-header">
        <h3 id="label-picker-remove-title" class="label-picker__confirm-title">Remover etiqueta</h3>
        <button type="button" class="label-picker__confirm-close" (click)="closeRemoveDialog()" aria-label="Fechar">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>

      <p class="label-picker__confirm-text">{{ removeConfirmationText }}</p>

      <footer class="label-picker__confirm-actions">
        <button type="button" class="btn btn-outline btn-sm" (click)="closeRemoveDialog()">Cancelar</button>
        <button type="button" class="btn btn-primary btn-sm label-picker__confirm-button" (click)="confirmRemoveLabel()">Remover</button>
      </footer>
    </div>
  </div>
</div>
