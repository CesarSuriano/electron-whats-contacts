<section class="console-shell">
  <app-bulk-action-bar
    *ngIf="isSelectionMode"
    [selectedCount]="selectedCount"
    [totalVisible]="totalVisible"
    [allSelected]="allSelected"
    [disabled]="isUiBlocked"
    (selectAll)="onSelectAll()"
    (clearSelection)="onClearSelection()"
    (exitMode)="onExitSelectionMode()"
    (openBulkSend)="onOpenBulkSend()"
    (openSchedule)="onScheduleFromSelection()"
  ></app-bulk-action-bar>

  <header class="console-toolbar" *ngIf="!isSelectionMode && instances.length > 1">
    <div class="toolbar-right">
      <label for="instance-select">Instância</label>
      <select
        id="instance-select"
        [ngModel]="selectedInstanceName"
        (ngModelChange)="onInstanceChange($event)"
        [disabled]="isUiBlocked"
      >
        <option *ngFor="let instance of instances" [ngValue]="instance.name">
          {{ instance.name }}{{ instance.connected ? ' (conectada)' : '' }}
        </option>
      </select>
      <button type="button" class="btn-refresh" (click)="onRefresh()" [disabled]="isUiBlocked" aria-label="Atualizar">
        <span class="material-symbols-outlined">refresh</span>
      </button>
    </div>
  </header>

  <p class="console-error" *ngIf="errorMessage">{{ errorMessage }}</p>

  <div class="console-body" *ngIf="!isInitialLoading; else loading">
    <app-conversation-list class="console-sidebar" [disabled]="isUiBlocked" (scheduleMessage)="onScheduleFromContact($event)"></app-conversation-list>
    <app-chat-view class="console-chat" [disabled]="isUiBlocked"></app-chat-view>
  </div>

  <ng-template #loading>
    <div class="console-loading">
      <div class="loading-spinner"></div>
      <p class="loading-title">{{ syncMessage || (isLoadingContacts ? 'Carregando contatos' : 'Conectando ao WhatsApp...') }}</p>
      <p class="loading-detail" *ngIf="syncDetail">{{ syncDetail }}</p>

      <div class="loading-progress" *ngIf="syncTotalSteps > 0">
        <div class="loading-progress-track">
          <span class="loading-progress-fill" [style.width.%]="syncProgress"></span>
        </div>
      </div>
    </div>
  </ng-template>

  <app-bulk-task-panel></app-bulk-task-panel>

  <app-message-template-modal
    [isOpen]="isTemplateModalOpen"
    [editorConfig]="templateEditorConfig"
    [initialTemplate]="''"
    (close)="onCloseTemplateModal()"
    (save)="onSaveTemplate($event)"
  ></app-message-template-modal>

  <app-schedule-modal
    [isOpen]="isScheduleModalOpen"
    (close)="isScheduleModalOpen = false"
    (confirm)="onScheduleDateConfirm($event)"
  ></app-schedule-modal>

  <app-message-template-modal
    [isOpen]="scheduleTemplateModalOpen"
    [editorConfig]="scheduleTemplateConfig"
    [initialTemplate]="scheduleEditInitialTemplate"
    [initialImageDataUrl]="scheduleEditInitialImage"
    (close)="onScheduleTemplateClose()"
    (save)="onScheduleTemplateSave($event)"
  ></app-message-template-modal>

  <app-schedule-list-modal
    [isOpen]="isScheduleListModalOpen"
    [schedules]="schedules"
    [availableContacts]="allContacts"
    [contactsLoading]="isLoadingContacts || (isInitialLoading && allContacts.length === 0)"
    (close)="onCloseScheduleList()"
    (createNew)="onCreateNewSchedule($event)"
    (editSchedule)="onEditSchedule($event)"
    (deleteSchedule)="onDeleteSchedule($event)"
  ></app-schedule-list-modal>

  <app-schedule-notification
    [schedule]="upcomingSchedule"
    (action)="onNotificationAction($event)"
    (dismiss)="onNotificationDismiss($event)"
    (snooze)="onNotificationSnooze($event)"
  ></app-schedule-notification>
</section>
