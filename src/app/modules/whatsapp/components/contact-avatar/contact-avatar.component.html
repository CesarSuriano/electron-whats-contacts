<div
  class="contact-avatar"
  [class.contact-avatar--small]="size === 'sm'"
  [class.contact-avatar--large]="size === 'lg'"
>
  <img class="contact-avatar__image" *ngIf="hasImage" [src]="photoUrl" [alt]="name || 'Contato'" (error)="onImageError()" />
  <span *ngIf="!hasImage" class="contact-avatar__initials">{{ initials }}</span>
</div>
