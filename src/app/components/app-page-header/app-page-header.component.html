<header class="app-page-header">
  <div class="app-page-header__copy">
    <h1 class="app-page-header__title">{{ title }}</h1>
    <p class="app-page-header__subtitle" *ngIf="subtitle">{{ subtitle }}</p>
  </div>

  <div class="app-page-header__actions">
    <div class="app-page-header__inline-actions">
      <ng-content select="[header-actions]"></ng-content>
    </div>

    <button
      class="app-page-header__menu-button"
      type="button"
      (click)="toggleTheme()"
      [attr.aria-label]="isDarkTheme ? 'Ativar tema claro' : 'Ativar tema escuro'"
    >
      <span class="material-symbols-outlined app-page-header__menu-icon">{{ isDarkTheme ? 'light_mode' : 'dark_mode' }}</span>
    </button>

    <div class="header-config-wrapper" *ngIf="showMenu">
      <button
        class="app-page-header__menu-button"
        type="button"
        (click)="toggleMenu()"
        aria-label="Configurações do app"
      >
        <span class="material-symbols-outlined app-page-header__menu-icon">more_horiz</span>
      </button>

      <div class="header-config-menu" *ngIf="isMenuOpen">
        <ng-content></ng-content>
      </div>
    </div>
  </div>
</header>
