<aside class="app-shell-sidebar" [class.app-shell-sidebar--expanded]="isExpanded">
  <div class="app-shell-sidebar__brand">
    <div class="app-shell-sidebar__brand-stack" aria-label="Uniq">
      <img
        [src]="isDarkTheme ? 'assets/logo-branca.png' : 'assets/logo-vermelha.png'"
        alt="Uniq"
        class="app-shell-sidebar__brand-image app-shell-sidebar__brand-image--full"
        [class.app-shell-sidebar__brand-image--visible]="isExpanded"
      />
      <img
        [src]="isDarkTheme ? 'assets/logo-branca-pequena.png' : 'assets/logo-vermelha-pequena.png'"
        alt=""
        aria-hidden="true"
        class="app-shell-sidebar__brand-image app-shell-sidebar__brand-image--compact"
        [class.app-shell-sidebar__brand-image--visible]="!isExpanded"
      />
    </div>
  </div>

  <section class="app-shell-sidebar__section">
    <span class="app-shell-sidebar__section-label">Principal</span>

    <button
      *ngFor="let item of primaryItems; trackBy: trackBySectionId"
      type="button"
      class="app-shell-sidebar__item"
      [class.app-shell-sidebar__item--active]="activeSection === item.id"
      (click)="select(item.id)"
    >
      <ng-container *ngIf="item.id === 'whatsapp'; else msIcon">
        <svg class="app-shell-sidebar__item-icon" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
          <path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/>
        </svg>
      </ng-container>
      <ng-template #msIcon>
        <span class="material-symbols-outlined app-shell-sidebar__item-icon" aria-hidden="true">{{ item.icon }}</span>
      </ng-template>
      <span class="app-shell-sidebar__item-text">{{ item.label }}</span>
      <span class="app-shell-sidebar__item-badge" *ngIf="badgeFor(item.id) > 0">{{ badgeFor(item.id) }}</span>
    </button>
  </section>

  <section class="app-shell-sidebar__section">
    <span class="app-shell-sidebar__section-label">Ferramentas</span>

    <button
      *ngFor="let item of toolItems; trackBy: trackBySectionId"
      type="button"
      class="app-shell-sidebar__item"
      [class.app-shell-sidebar__item--active]="activeSection === item.id"
      (click)="select(item.id)"
    >
      <span class="material-symbols-outlined app-shell-sidebar__item-icon" aria-hidden="true">{{ item.icon }}</span>
      <span class="app-shell-sidebar__item-text">{{ item.label }}</span>
      <span class="app-shell-sidebar__item-badge" *ngIf="badgeFor(item.id) > 0">{{ badgeFor(item.id) }}</span>
    </button>
  </section>

  <section class="app-shell-sidebar__section app-shell-sidebar__section--system">
    <span class="app-shell-sidebar__section-label">Sistema</span>

    <button
      *ngFor="let item of systemItems; trackBy: trackBySectionId"
      type="button"
      class="app-shell-sidebar__item"
      [class.app-shell-sidebar__item--active]="activeSection === item.id"
      (click)="select(item.id)"
    >
      <span class="material-symbols-outlined app-shell-sidebar__item-icon" aria-hidden="true">{{ item.icon }}</span>
      <span class="app-shell-sidebar__item-text">{{ item.label }}</span>
    </button>
  </section>

  <div class="app-shell-sidebar__footer">
    <button type="button" class="app-shell-sidebar__about" (click)="about.emit()">
      <span class="material-symbols-outlined app-shell-sidebar__item-icon">info</span>
      <span class="app-shell-sidebar__item-text">Sobre</span>
    </button>

    <button
      type="button"
      class="app-shell-sidebar__toggle"
      (click)="toggleExpanded()"
      [attr.aria-expanded]="isExpanded"
      [attr.aria-label]="sidebarToggleLabel"
      [attr.title]="sidebarToggleLabel"
    >
      <span class="material-symbols-outlined app-shell-sidebar__item-icon app-shell-sidebar__toggle-icon">chevron_right</span>
      <span class="app-shell-sidebar__item-text">{{ isExpanded ? 'Fechar menu' : 'Abrir menu' }}</span>
    </button>
  </div>
</aside>
